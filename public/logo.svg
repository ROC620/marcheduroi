<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6584"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43C6AC"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond transparent - pas de background -->

  <!-- Hexagone décoratif -->
  <polygon points="250,80 345,133 345,240 250,293 155,240 155,133"
           fill="url(#mainGrad)" opacity="0.12"/>
  <polygon points="250,80 345,133 345,240 250,293 155,240 155,133"
           fill="none" stroke="url(#mainGrad)" stroke-width="2.5" opacity="0.7"
           filter="url(#glow)"/>

  <!-- Lettre M stylisée -->
  <path d="M185 245 L185 155 L250 210 L315 155 L315 245"
        fill="none" stroke="url(#mainGrad)" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Flèche flow -->
  <path d="M160 278 Q250 325 340 278"
        fill="none" stroke="url(#accentGrad)" stroke-width="4"
        stroke-linecap="round" opacity="0.9"/>
  <polygon points="340,266 358,278 340,290" fill="#43C6AC" opacity="0.9"/>

  <!-- Points décoratifs -->
  <circle cx="148" cy="158" r="5" fill="#6C63FF" opacity="0.7"/>
  <circle cx="352" cy="158" r="5" fill="#FF6584" opacity="0.7"/>
  <circle cx="148" cy="205" r="3" fill="#43C6AC" opacity="0.5"/>
  <circle cx="352" cy="205" r="3" fill="#43C6AC" opacity="0.5"/>

  <!-- Texte MarketFlow -->
  <text x="250" y="368"
        font-family="Georgia, serif"
        font-size="46"
        font-weight="700"
        text-anchor="middle"
        fill="url(#mainGrad)"
        letter-spacing="2"
        filter="url(#softglow)">MarketFlow</text>

  <!-- Tagline -->
  <text x="250" y="400"
        font-family="Georgia, serif"
        font-size="15"
        font-weight="400"
        text-anchor="middle"
        fill="#9A9AB0"
        letter-spacing="5">BÉNIN · AFRIQUE</text>

  <!-- Ligne décorative -->
  <line x1="185" y1="415" x2="315" y2="415" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Globe terrestre -->
  <g transform="translate(250, 445)" filter="url(#softglow)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="9" ry="20" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="-17" y1="-10" x2="17" y2="-10" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="-17" y1="10" x2="17" y2="10" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>
    <circle cx="3" cy="2" r="3" fill="#FF6584" opacity="0.9"/>
  </g>
</svg>
