<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6584"/>
    </linearGradient>
  </defs>
  <!-- Fond carré arrondi -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Hexagone blanc -->
  <path d="M256 60 L400 140 L400 330 L256 410 L112 330 L112 140 Z"
    fill="white" opacity="0.15" stroke="white" stroke-width="10"/>
  <!-- Grand M blanc -->
  <text x="256" y="310" text-anchor="middle" font-size="230" font-weight="900"
    fill="white" font-family="Georgia, serif">M</text>
  <!-- Flèche droite blanche -->
  <line x1="120" y1="390" x2="370" y2="390" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polygon points="358,372 392,390 358,408" fill="white"/>
  <!-- Texte MarcheduRoi avec couronne sur i -->
  <text x="220" y="455" text-anchor="middle" font-size="48" font-weight="700"
    fill="white" font-family="Georgia, serif" font-style="italic">MarcheduRo</text>
  <text x="340" y="455" text-anchor="middle" font-size="48" font-weight="700"
    fill="white" font-family="Georgia, serif" font-style="italic">i</text>
  <!-- Couronne sur le i -->
  <text x="340" y="415" text-anchor="middle" font-size="28">👑</text>
</svg>
